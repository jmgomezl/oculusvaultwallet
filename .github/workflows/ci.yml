name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Test SDK
        run: npm test --workspace @oculusvault/sdk

      - name: Test server (vault)
        run: npm test --workspace @oculusvault/server

      - name: Build Mini App
        run: npm run build --workspace @oculusvault/miniapp
